<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- viewport-fit=cover is required to use safe-area insets (Dynamic Island) on iPhone -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#fbf3e0" />
  <title>Dive Center Tycoon</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fbf3e0;
      /* Prevent page bounce/scroll while dragging inside the game */
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game {
      width: 100%;
      height: 100%;
    }
    /* Phaser centers its own canvas; this is just a spillover guard */
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <script type="module" src="/game.js"></script>
</body>
</html>
